<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>TOEFL Vocabulary Trainer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>TOEFL Vocabulary Trainer</h1>

        <!-- 例句 -->
        <div
            id="sentence"
            class="sentence">

            Loading vocabulary...

        </div>

        <!-- 单词补全区域 -->
        <div
            id="wordArea"
            class="word-area">

        </div>

        <!-- 提交按钮 -->
        <div class="controls">

            <button onclick="checkAnswer()">

                Submit

            </button>

        </div>

        <!-- 结果区域 -->
        <div
            id="result"
            class="result">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
